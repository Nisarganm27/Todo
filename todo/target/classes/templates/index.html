<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            margin-top:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h2{
            font-weight:bold;
        }

        table{
            margin-top:20px;
        }

        .completed{
            text-decoration:line-through;
            color:green;
            font-weight:bold;
        }

        .pending{
            color:red;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card p-4">

        <h2 class="text-center text-primary mb-4">
            📝 Todo List Application
        </h2>

        <!-- Add Task -->

        <form action="/add" method="post">

            <div class="input-group mb-3">

                <input
                        type="text"
                        name="task"
                        class="form-control"
                        placeholder="Enter Task..."
                        required>

                <button class="btn btn-primary">
                    Add Task
                </button>

            </div>

        </form>

        <!-- Task Table -->

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Task</th>
                <th>Status</th>
                <th width="330">Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="todo : ${todos}">

                <td th:text="${todo.id}"></td>

                <td>

                    <span
                            th:text="${todo.task}"
                            th:class="${todo.completed} ? 'completed' : ''">
                    </span>

                </td>

                <td>

                    <span
                            th:if="${todo.completed}"
                            class="badge bg-success">

                        Completed

                    </span>

                    <span
                            th:unless="${todo.completed}"
                            class="badge bg-warning text-dark">

                        Pending

                    </span>

                </td>

                <td>

                    <a
                            th:href="@{/complete/{id}(id=${todo.id})}"
                            class="btn btn-success btn-sm">

                        Complete

                    </a>

                    <a
                            th:href="@{/pending/{id}(id=${todo.id})}"
                            class="btn btn-secondary btn-sm">

                        Pending

                    </a>

                    <a
                            th:href="@{/edit/{id}(id=${todo.id})}"
                            class="btn btn-warning btn-sm">

                        Edit

                    </a>

                    <a
                            th:href="@{/delete/{id}(id=${todo.id})}"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this task?')">

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
